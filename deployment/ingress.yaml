apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rfpop-ingress
  annotations:
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://rfpop-vgraillat.user.lab.sspcloud.fr" 
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "rfpop-service"
spec:
  ingressClassName: onyxia
  tls:
    - hosts:
        - REPLACE_ME_WITH_KUSTOMIZE
  rules:
    - host: REPLACE_ME_WITH_KUSTOMIZE
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rfpop-service
                port:
                  number: 80
